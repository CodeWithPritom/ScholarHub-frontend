<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://scholarhub-ai.me/" />
    
    <title>ScholarHub AI | Global Research Discovery Hub</title>
    <meta name="description" content="ScholarHub AI is the ultimate intelligent research platform. Unifying GEB, Pharmacy, Engineering, and General Literature into one AI-powered discovery hub with zero hallucination." />
    <meta name="keywords" content="ScholarHub, AI Research, Academic Research, Literature Review, PubMed, arXiv, Semantic Scholar, Llama 3.1, Groq, Research Assistant" />
    <meta name="author" content="Arup Bhowmik Pritom" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scholarhub-ai.me/" />
    <meta property="og:title" content="ScholarHub AI | Global Research Discovery Hub" />
    <meta property="og:description" content="Unifying global academic databases into one AI-powered discovery hub with zero hallucination." />
    <meta property="og:image" content="https://scholarhub-ai.me/vite.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://scholarhub-ai.me/" />
    <meta name="twitter:title" content="ScholarHub AI | Global Research Discovery Hub" />
    <meta name="twitter:description" content="Unifying global academic databases into one AI-powered discovery hub with zero hallucination." />
    <meta name="twitter:image" content="https://scholarhub-ai.me/vite.svg" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ScholarHub AI",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "url": "https://scholarhub-ai.me",
        "description": "ScholarHub AI is the ultimate intelligent research platform unifying specialized academic databases into one AI-powered discovery hub.",
        "creator": {
          "@type": "Person",
          "name": "Arup Bhowmik Pritom"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "BDT"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ScholarHub AI",
        "url": "https://scholarhub-ai.me",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://scholarhub-ai.me/research?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Outfit', sans-serif;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
